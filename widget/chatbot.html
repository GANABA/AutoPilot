<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant Immobilier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* Bouton flottant */
    #chat-toggle {
      position: fixed; bottom: 24px; right: 24px;
      width: 56px; height: 56px; border-radius: 50%;
      background: #1a56db; color: #fff; border: none;
      font-size: 24px; cursor: pointer;
      box-shadow: 0 4px 12px rgba(0,0,0,.25);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; transition: transform .2s;
    }
    #chat-toggle:hover { transform: scale(1.08); }

    /* Fenêtre chat */
    #chat-window {
      position: fixed; bottom: 92px; right: 24px;
      width: 360px; max-height: 540px;
      background: #fff; border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      display: none; flex-direction: column;
      z-index: 9998; overflow: hidden;
    }
    #chat-window.open { display: flex; }

    /* Header */
    #chat-header {
      background: #1a56db; color: #fff;
      padding: 14px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    #chat-header .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    #chat-header .info { flex: 1; }
    #chat-header .name { font-weight: 600; font-size: 15px; }
    #chat-header .status { font-size: 12px; opacity: .8; }
    #chat-header button {
      background: none; border: none; color: #fff;
      font-size: 20px; cursor: pointer; opacity: .7;
    }
    #chat-header button:hover { opacity: 1; }

    /* Messages */
    #chat-messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .msg {
      max-width: 80%; padding: 10px 14px;
      border-radius: 16px; font-size: 14px; line-height: 1.45;
    }
    .msg.user {
      background: #1a56db; color: #fff;
      align-self: flex-end; border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      background: #f0f4ff; color: #1e293b;
      align-self: flex-start; border-bottom-left-radius: 4px;
    }
    .msg.typing { opacity: .6; font-style: italic; }

    /* Saisie */
    #chat-input-area {
      padding: 12px; border-top: 1px solid #e5e7eb;
      display: flex; gap: 8px;
    }
    #chat-input {
      flex: 1; border: 1px solid #d1d5db; border-radius: 24px;
      padding: 8px 14px; font-size: 14px; outline: none;
      transition: border-color .2s;
    }
    #chat-input:focus { border-color: #1a56db; }
    #chat-send {
      width: 38px; height: 38px; border-radius: 50%;
      background: #1a56db; color: #fff; border: none;
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    #chat-send:hover { background: #1e40af; }
    #chat-send:disabled { background: #9ca3af; cursor: default; }
  </style>
</head>
<body>

<button id="chat-toggle" title="Assistant immobilier">💬</button>

<div id="chat-window">
  <div id="chat-header">
    <div class="avatar">🏠</div>
    <div class="info">
      <div class="name" id="agency-name">Assistant Immobilier</div>
      <div class="status">En ligne</div>
    </div>
    <button onclick="toggleChat()" title="Fermer">✕</button>
  </div>
  <div id="chat-messages"></div>
  <div id="chat-input-area">
    <input id="chat-input" type="text" placeholder="Votre message..." autocomplete="off" />
    <button id="chat-send" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  // ── Configuration ───────────────────────────────────────────────
  const API_URL  = document.currentScript?.dataset.api  || 'https://autopilot-production-29fb.up.railway.app';
  const WIDGET_TOKEN = document.currentScript?.dataset.token || 'tok_change_me';
  const AGENCY_NAME  = document.currentScript?.dataset.agency || 'Assistant Immobilier';

  document.getElementById('agency-name').textContent = AGENCY_NAME;

  // ── État ────────────────────────────────────────────────────────
  let conversationId = localStorage.getItem('ap_conv_id') || null;

  // ── UI ──────────────────────────────────────────────────────────
  function toggleChat() {
    const win = document.getElementById('chat-window');
    const isOpen = win.classList.toggle('open');
    document.getElementById('chat-toggle').textContent = isOpen ? '✕' : '💬';
    if (isOpen && document.getElementById('chat-messages').children.length === 0) {
      appendMessage('assistant', `Bonjour ! Je suis l'assistant de ${AGENCY_NAME}. Comment puis-je vous aider ? 😊`);
    }
    if (isOpen) document.getElementById('chat-input').focus();
  }

  function appendMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    const msgs = document.getElementById('chat-messages');
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function setTyping(show) {
    const existing = document.getElementById('typing-indicator');
    if (show && !existing) {
      const d = appendMessage('assistant', '...');
      d.id = 'typing-indicator';
      d.classList.add('typing');
    } else if (!show && existing) {
      existing.remove();
    }
  }

  // ── API ─────────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    document.getElementById('chat-send').disabled = true;
    appendMessage('user', text);
    setTyping(true);

    try {
      const res = await fetch(`${API_URL}/api/chat`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Widget-Token': WIDGET_TOKEN,
        },
        body: JSON.stringify({ message: text, conversation_id: conversationId }),
      });

      const data = await res.json();
      setTyping(false);

      if (res.ok) {
        conversationId = data.conversation_id;
        localStorage.setItem('ap_conv_id', conversationId);
        appendMessage('assistant', data.reply);
      } else {
        appendMessage('assistant', "Désolé, une erreur s'est produite. Réessayez.");
      }
    } catch {
      setTyping(false);
      appendMessage('assistant', "Impossible de contacter l'assistant. Vérifiez votre connexion.");
    }

    document.getElementById('chat-send').disabled = false;
    document.getElementById('chat-input').focus();
  }

  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
</script>
</body>
</html>
